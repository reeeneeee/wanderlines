<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Wanderlines · Journeys</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&family=Bungee&family=Caveat&family=EB+Garamond&family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;600;700&family=Jost:wght@400;500;700&family=Monoton&family=Quicksand:wght@400;600;700&family=Righteous&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />

<body>

  <script type="module" src="./src/app.mjs"></script>
